<!doctype html>
<html lang="bn">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nityaseva Splash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
            border-radius: 18px;
            -webkit-border-radius: 18px;
        }

        .outer {
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            overflow: hidden;
        }

        .card {
            width: 600px;
            background: #111008;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            border: 1px solid #6b4a12;
        }

        .gold-line-top {
            height: 2px;
            background: linear-gradient(90deg, transparent, #c9860a, #f5d060, #c9860a, transparent);
        }

        .gloss-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 220, 100, 0.04) 0%, transparent 100%);
            pointer-events: none;
            border-radius: 18px 18px 0 0;
            z-index: 1;
        }

        .inner {
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        .main-row {
            display: flex;
            align-items: stretch;
            gap: 0;
            padding: 28px 32px 22px;
        }

        .img-col {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .img-wrap {
            width: 175px;
            height: 210px;
            border-radius: 12px;
            border: 1.5px solid #c9860a;
            overflow: hidden;
            position: relative;
        }

        .img-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 220, 100, 0.08) 0%, transparent 40%, rgba(0, 0, 0, 0.35) 100%);
            border-radius: 12px;
            pointer-events: none;
        }

        .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .divider-v {
            width: 1px;
            background: linear-gradient(180deg, transparent, #5a3e1b 20%, #5a3e1b 80%, transparent);
            margin: 0 28px;
            flex-shrink: 0;
        }

        .right-col {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
            flex: 1;
        }

        .nitya {
            font-size: 36px;
            font-weight: 700;
            color: #f5d060;
            text-shadow: 0 0 18px rgba(245, 200, 66, 0.25);
            line-height: 1.2;
            letter-spacing: 0.5px;
        }

        .iskcon-name {
            font-size: 24px;
            font-weight: 600;
            color: #e8c87a;
            line-height: 1.3;
        }

        .address-txt {
            font-size: 14px;
            font-weight: 400;
            color: #8a6a38;
            line-height: 1.4;
            margin-top: 2px;
        }

        .ver-badge {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, #1e1408, #2e1e08);
            border: 1px solid #6b4a12;
            border-radius: 24px;
            padding: 5px 18px;
            margin-top: 8px;
            align-self: flex-start;
        }

        .ver-badge span {
            font-family: 'Cinzel', serif;
            font-size: 12px;
            font-weight: 500;
            color: #c9860a;
            letter-spacing: 2px;
        }

        .footer-section {
            border-top: 1px solid #312307;
            padding: 12px 32px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dev-txt {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            color: #ffae43;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        .ticker-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
            max-width: 300px;
        }

        .ticker-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #c9860a;
            flex-shrink: 0;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        .ticker-text {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            color: #ffae43;
            letter-spacing: 0.5px;
            white-space: nowrap;
            animation: fadeName 0.4s ease;
        }

        @keyframes fadeName {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gold-line-bot {
            height: 1.5px;
            background: linear-gradient(90deg, transparent, #3a2a0a, transparent);
        }

        .corner-tl,
        .corner-tr,
        .corner-bl,
        .corner-br {
            position: absolute;
            width: 14px;
            height: 14px;
            z-index: 3;
        }

        .corner-tl {
            top: 8px;
            left: 8px;
            border-top: 1.5px solid #c9860a;
            border-left: 1.5px solid #c9860a;
            border-radius: 3px 0 0 0;
        }

        .corner-tr {
            top: 8px;
            right: 8px;
            border-top: 1.5px solid #c9860a;
            border-right: 1.5px solid #c9860a;
            border-radius: 0 3px 0 0;
        }

        .corner-bl {
            bottom: 8px;
            left: 8px;
            border-bottom: 1.5px solid #c9860a;
            border-left: 1.5px solid #c9860a;
            border-radius: 0 0 0 3px;
        }

        .corner-br {
            bottom: 8px;
            right: 8px;
            border-bottom: 1.5px solid #c9860a;
            border-right: 1.5px solid #c9860a;
            border-radius: 0 0 3px 0;
        }
    </style>
</head>

<body>
    <div class="outer">
        <div class="card">
            <div class="corner-tl"></div>
            <div class="corner-tr"></div>
            <div class="corner-bl"></div>
            <div class="corner-br"></div>
            <div class="gloss-overlay"></div>
            <div class="gold-line-top"></div>
            <div class="inner">
                <div class="main-row">
                    <div class="img-col">
                        <div class="img-wrap">
                            <img src="/prabhupada.avif" alt="Srila Prabhupada">
                        </div>
                    </div>
                    <div class="divider-v"></div>
                    <div class="right-col">
                        <div class="nitya">নিত্যসেবা বিভাগ</div>
                        <div class="iskcon-name">ইসকন, বাংলাদেশ</div>
                        <div class="address-txt">৭৯, স্বামীবাগ, ঢাকা-১১০০</div>
                        <div class="ver-badge"><span>VERSION &nbsp;1.0.0</span></div>
                    </div>
                </div>
                <div class="footer-section">
                    <div class="dev-txt">Developed By : hksamacar</div>
                    <div class="ticker-wrap">
                        <div class="ticker-dot"></div>
                        <div class="ticker-text" id="ticker">Loading modules...</div>
                    </div>
                </div>
            </div>
            <div class="gold-line-bot"></div>
        </div>
    </div>

    <script>
        const items = [
            "Initializing Nityaseva...",            
            "Connecting to Database...",
            "Loading Member Records...",
            "Loading Donation Records...",
            "Preparing Monthly Reports...",
            "Starting Nityaseva App..."
        ];
        const el = document.getElementById('ticker');
        let i = 0;
        function next() {
            el.style.animation = 'none';
            void el.offsetWidth;
            el.style.animation = 'fadeName 0.4s ease';
            el.textContent = items[i % items.length];
            i++;
        }
        next();
        setInterval(next, 1100);
    </script>

</body>

</html>
