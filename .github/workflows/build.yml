name: Build & Release Nityaseva

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node 20 deprecation warnings

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""

          # Build separate binaries for each Mac arch (the correct approach –
          # passing --target twice to a single invocation is not supported).
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"

          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

          # - platform: ubuntu-22.04
          #   args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # - name: Install Linux dependencies
      #   if: matrix.platform == 'ubuntu-22.04'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y \
      #       libwebkit2gtk-4.1-dev \
      #       libsoup-3.0-dev \
      #       libappindicator3-dev \
      #       librsvg2-dev \
      #       patchelf \
      #       libssl-dev \
      #       libgtk-3-dev

      - name: Install frontend dependencies
        run: bun install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only inject signing secrets if they are actually configured.
          # Remove these two lines entirely if you haven't set up the updater.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Nityaseva ${{ github.ref_name }}"
          releaseBody: |
            ## What's new in ${{ github.ref_name }}
            Download the installer for your platform below.
            | Platform | File |
            |---|---|
            | Windows | `.msi` or `-setup.exe` |
            | macOS Apple Silicon | `-aarch64.dmg` |
            | macOS Intel | `-x64.dmg` |
            | Linux | `.AppImage` or `.deb` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
